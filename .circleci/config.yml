version: 2.1

workflows:
  build-and-deploy:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main
      - deploy:
          filters:
            branches:
              only:
                - main
          requires:
            - build

jobs:
  build:
    working_directory: ~/PtahNest
    docker:
      - image: cimg/node:20.0
    steps:
      - checkout
      - setup_remote_docker
      - restore_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
      - run:
          name: Install Dependencies
          command: npm install
      - save_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
          paths:
            - ./node_modules
      - run:
          name: Docker Login
          command: docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
      - run:
          name: Build Docker Image
          command: docker build -t $IMAGE_NAME:latest .
      - run:
          name: Push Docker Image
          command: docker push $IMAGE_NAME:latest

  deploy:
    docker:
      - image: cimg/base:current
    steps:
      - run:
          name: Deploy to EC2
          command: ssh -o StrictHostKeyChecking=no $EC2_USERNAME@$EC2_PUBLIC_DNS "docker pull $IMAGE_NAME:latest && docker stop ptahnest || true && docker rm ptahnest || true && docker run -d --name ptahnest --env-file ~/.env -v ~/certs/privatekey.pem:/app/privatekey.pem:ro -v ~/certs/server.crt:/app/server.crt:ro -p 8443:8443 --add-host=host.docker.internal:host-gateway --restart unless-stopped $IMAGE_NAME:latest && sudo iptables -t nat -A PREROUTING -p tcp --dport 443 -j REDIRECT --to-port 8443 && sudo iptables -t nat -A PREROUTING -p tcp --dport 80 -j REDIRECT --to-port 8443"
